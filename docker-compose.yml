# Production stack for VPS deploys.
#   db   — persistent Postgres 17
#   app  — the React Router SSR server (built from ./Dockerfile)
#
# The app image is tagged visiontemplate-app:${IMAGE_TAG} so scripts/deploy.sh
# can swap tags and roll back to a previously known-good image without rebuilding.
#
# First run: copy .env.example to .env and adjust POSTGRES_* / DATABASE_URL.

name: visiontemplate

services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-vision}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-visionpass}
      POSTGRES_DB: ${POSTGRES_DB:-vision_template}
    volumes:
      - db_data:/var/lib/postgresql/data
      # Runs ONLY on first init (empty data volume), seeding the notes table.
      - ./db/setup.sql:/docker-entrypoint-initdb.d/01-setup.sql:ro
      # Daily dumps land here (written by scripts/backup-db.sh on the host,
      # or by a cron container). Survives container rebuilds.
      - db_backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vision} -d ${POSTGRES_DB:-vision_template}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    # Do NOT publish 5432 in production unless you know what you're doing;
    # the app talks to it over the internal network. Uncomment for local debugging.
    # ports:
    #   - "5432:5432"

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: visiontemplate-app:${IMAGE_TAG:-latest}
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://vision:visionpass@db:5432/vision_template}
      PORT: ${PORT:-3000}
      NODE_ENV: ${NODE_ENV:-production}
    ports:
      - "${APP_PORT:-3000}:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:${PORT:-3000}/api/ping | grep -q '\"pong\":true' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s

volumes:
  db_data:
  db_backups:
