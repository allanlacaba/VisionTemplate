name: CI

# One pipeline: verify on every push/PR; build the image and deploy only on
# pushes (merges) to main. The image is built on the runner (plenty of RAM) and
# pushed to GHCR, so the 512MB VPS never builds — it just pulls.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Do NOT cancel a run that has reached the deploy stage — interrupting a deploy
# mid-recreate or mid-rollback can leave the app in a broken state. New pushes
# queue behind the current run instead.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write   # push images to ghcr.io via GITHUB_TOKEN

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/visiontemplate

jobs:
  # ---- 1. quality gate (runs on every push & PR) ----------------------------
  verify:
    name: typecheck & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build

  # ---- 2. build & push image to GHCR (main only) ----------------------------
  build-image:
    name: build & push image
    needs: verify
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        run: echo "tag=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ steps.meta.outputs.tag }}
            ${{ env.IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---- 3. deploy to the VPS by pulling the image just pushed -----------------
  deploy:
    name: deploy to VPS
    needs: build-image
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: SSH deploy
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          # IMAGE_TAG is passed to scripts/deploy.sh so the VPS pulls the exact
          # image CI just built (no reliance on matching local git short-shas).
          script: |
            set -euo pipefail
            cd "${{ secrets.DEPLOY_PATH }}"
            git fetch --all --prune
            git reset --hard origin/main
            export IMAGE_TAG="${{ needs.build-image.outputs.tag }}"
            bash ./scripts/deploy.sh
