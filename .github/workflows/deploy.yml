name: Deploy

# Triggered by every push to main. SSHs into the VPS, pulls the new commit,
# and runs scripts/deploy.sh, which builds the new app image, health-checks it,
# and rolls back to the previous image on failure.
#
# Required repo secrets (Settings → Secrets and variables → Actions):
#   SSH_HOST      e.g. 203.0.113.10 (or your domain)
#   SSH_USER      e.g. deploy
#   SSH_KEY       private key (PEM) whose public half is in ~/.ssh/authorized_keys on the host
#   SSH_PORT      e.g. 22
#   DEPLOY_PATH   absolute path to the checked-out repo on the host, e.g. /srv/visiontemplate

on:
  push:
    branches: [main]
  workflow_dispatch:

# Never interrupt a deploy/rollback in progress; queue concurrent pushes instead.
concurrency:
  group: deploy-main
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: SSH deploy to VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -euo pipefail
            cd "${{ secrets.DEPLOY_PATH }}"
            git fetch --all --prune
            git reset --hard origin/main
            bash ./scripts/deploy.sh
